{% set name = "napari-spatialdata" %}
{% set version = "0.7.0" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: eb22d6e53a0ff4b0692a99518fe0d86e9fc9760090f633b0ed59fc9017ff18f5

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
    - setuptools-scm
  run:
    - python >={{ python_min }}
    - anndata >=0.12.0
    - click
    - cycler
    - dask-core >=2025.2.0
    - geopandas
    - loguru
    - matplotlib-base
    - napari >=0.6.2
    - napari-matplotlib >=3.0.2
    - numba
    - numpy
    - packaging
    - pandas
    - pillow
    - pyqtgraph
    - qtpy
    - scanpy
    - scipy
    - shapely
    - scikit-learn
    - spatialdata >=0.7.0
    - superqt
    - typing-extensions >=4.8.0
    - vispy
    - xarray
    - xarray-datatree

test:
  imports:
    - napari_spatialdata
  commands:
    - pip list
    - pip check
  requires:
    - pip
    - python {{ python_min }}
    - pyqt

about:
  home: https://pypi.org/project/napari-spatialdata
  summary: Interactive visualization of spatial omics data with napari
  license: BSD-3-Clause
  license_file: LICENSE
  dev_url: https://github.com/scverse/napari-spatialdata

extra:
  recipe-maintainers:
    - giovp
    - goanpeca
    - jaimergp
    - LucaMarconato
    - melonora
